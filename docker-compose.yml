services:
  mysql:
    image: mysql:8.4
    container_name: personaos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: personaos
      MYSQL_USER: personaos
      MYSQL_PASSWORD: personaos
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - personaos-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  personaos-mysql-data:
